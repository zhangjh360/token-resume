monitor:
  processes:
    - name: "claude"
      pattern: "claude .*"
    - name: "codex"
      pattern: "codex .*"
  poll_interval: 10s
  token_check_interval: 30s
  terminals_dir: "/home/zhangjh/.cursor/projects/home-zhangjh-work-code-golang-token-resume/terminals"
  claude_projects_dir: "/home/zhangjh/.claude/projects"

rate_limit:
  provider: "anthropic"
  api_key: ""
  auth_token: "${ANTHROPIC_AUTH_TOKEN}"
  base_url: "${ANTHROPIC_BASE_URL}"
  endpoint_path: "/v1/rate_limit"
  proxy_endpoint: ""
  headers: {}
  fallback:
    limit_per_5h: 1000000
    reset_window_minutes: 300

resume:
  strategy: "session_replay"
  restart_command: "claude --resume {{.SessionID}}"
  safety_margin_seconds: 60
  snapshot_path: ".tokenresume-snapshots.json"

logging:
  level: "info"
  file: ""
